<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Menu preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
<style>
  body { margin:0; }
  /* Force the menu visible without JS for preview, constrained to phone width */
  .preview-frame {
    width: 390px; height: 720px; margin: 24px auto; position: relative;
    border: 1px solid var(--line-strong); border-radius: 28px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
  }
  .preview-frame .mobile-menu {
    position: absolute; opacity: 1 !important; visibility: visible !important; pointer-events: auto !important;
  }
</style>
</head>
<body>
<div class="preview-frame">
  <div class="mobile-menu open" id="mobile-menu" role="dialog" aria-modal="true">
    <div class="mobile-menu-head">
      <a class="brand" href="#" aria-label="The Khan Trading home">
        <span class="brand-mark"><img src="assets/img/logo.jpg" alt="logo" /></span>
        <span>The Khan Trading</span>
      </a>
      <button class="mobile-menu-close" aria-label="Close menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6l-12 12" /></svg>
      </button>
    </div>
    <nav class="mobile-menu-nav">
      <a href="#" class="active">
        <span class="nav-num">01</span>
        <span class="nav-label">Home</span>
        <svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7" /></svg>
      </a>
      <div class="mobile-learn-section">
        <div class="mobile-learn-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          <span>Learn</span>
        </div>
        <a href="#" class="mobile-learn-card">
          <span class="mlc-num">02</span>
          <span class="mlc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
          <span class="mlc-text"><span class="mlc-title">ICT Concepts</span><span class="mlc-sub">Inner Circle Trader</span></span>
          <svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
        <a href="#" class="mobile-learn-card">
          <span class="mlc-num">03</span>
          <span class="mlc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg></span>
          <span class="mlc-text"><span class="mlc-title">CRT Model</span><span class="mlc-sub">Consequent Range Theory</span></span>
          <svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      </div>
      <a href="#"><span class="nav-num">04</span><span class="nav-label">About</span><svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7" /></svg></a>
      <a href="#"><span class="nav-num">05</span><span class="nav-label">Pricing</span><svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7" /></svg></a>
      <a href="#"><span class="nav-num">06</span><span class="nav-label">Contact</span><svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7" /></svg></a>
    </nav>
  </div>
</div>
</body>
</html>
