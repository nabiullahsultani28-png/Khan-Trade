<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Login — The Khan Trading</title>
<meta name="theme-color" content="#0A0E14" />
<link rel="icon" type="image/jpeg" href="assets/img/logo.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="auth-layout">
  <div class="auth-side">
    <div class="auth-side-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark"><img src="assets/img/logo.jpg" alt="Logo" /></span>
        <span>The Khan Trading</span>
      </a>
      <h2 style="font-size: 2rem; margin-bottom: 16px;">Social Intelligence <span style="color: var(--bull);">Platform</span></h2>
      <p style="color: var(--ink-mute); font-size: 1.1rem;">Join the leading community of serious traders. Master ICT, CRT, and Unicorn strategies.</p>
    </div>
  </div>
  
  <div class="auth-form-container">
    <div class="auth-form-inner">
      <h2>Log in to your account</h2>
      <form class="form" action="#" method="POST">
        <div>
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" required autocomplete="email" />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" />
        </div>
        <div style="text-align: right; margin-top: -16px; margin-bottom: 24px;">
          <a href="#" style="color: var(--bull); font-size: 0.9rem; font-weight: 500;">Forgot Your Password?</a>
        </div>
        <button type="submit" style="width: 100%;">Login</button>
      </form>
      
      <div class="auth-or">Or</div>
      
      <div class="auth-footer">
        <p>Not a Member yet? <a href="register.html">Sign up now!</a></p>
      </div>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
