<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Register - The Khan Trading</title>
<meta name="theme-color" content="#0A0E14" />
<meta name="robots" content="noindex" />
<link rel="icon" type="image/jpeg" href="assets/img/logo.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="auth-layout">
  <div class="auth-side">
    <div class="auth-top-nav">
      <a href="index.html" class="auth-nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Home
      </a>
      <a href="pricing.html" class="auth-nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        Pricing
      </a>
    </div>
    <div class="auth-side-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark"><img src="assets/img/logo.jpg" alt="Logo" style="border-radius: 8px;" /></span>
        <span style="font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;">The Khan Trading</span>
      </a>
      <h2 class="auth-tagline">Elite Trading<br><span style="color: var(--bull); -webkit-text-fill-color: initial;">Academy</span></h2>
      <p class="auth-desc">Join the leading community of serious traders. Master ICT, CRT, and Unicorn strategies with precision.</p>
    </div>
  </div>
  
  <div class="auth-form-container reveal">
    <div class="auth-form-inner" style="max-width: 480px;">
      <h2>Create Account</h2>
      <form class="form" action="register.html" method="GET" data-static-form data-static-message="Registration is not connected yet. Use Contact if you need help joining.">
        <div class="grid-2" style="gap: 20px; align-items: start; margin-bottom: 0;">
          <div>
            <label for="firstName">First Name</label>
            <input id="firstName" name="firstName" type="text" required autocomplete="given-name" />
          </div>
          <div>
            <label for="lastName">Last Name</label>
            <input id="lastName" name="lastName" type="text" required autocomplete="family-name" />
          </div>
        </div>
        
        <div class="custom-select-container" id="country-container">
          <label for="country-search">Country</label>
          <div class="custom-select-control">
            <input type="text" id="country-search" class="custom-select-input" placeholder="Select Country&hellip;" autocomplete="off" required />
            <input type="hidden" id="country" name="country" required />
            <svg class="custom-select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </div>
          <div class="custom-select-dropdown">
            <div class="custom-select-list" id="country-list"></div>
          </div>
        </div>
        
        <div>
          <label for="phone">Phone Number</label>
          <div style="display: flex; gap: 12px;">
            <input type="text" id="phoneCode" name="phoneCode" value="+1" style="width: 80px; text-align: center;" aria-label="Country Code" />
            <input id="phone" name="phone" type="tel" required style="flex: 1;" />
          </div>
        </div>

        <div>
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" required autocomplete="email" />
        </div>
        
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="new-password" />
        </div>
        
        <div class="auth-terms">
          <input type="checkbox" id="terms" name="terms" required />
          <label for="terms">
            I have read and accept the <a href="about.html#terms">Terms of use</a>, <a href="about.html#privacy">Privacy Policy</a>, <a href="about.html#conflict">Conflict of Interest Policy</a>, <a href="about.html#consent">Declaration of Consent</a>, and <a href="about.html#risk">Risk Disclaimer</a>.
          </label>
        </div>

        <button type="submit" style="width: 100%;">Create account</button>
        <p class="form-status" role="status" aria-live="polite" tabindex="-1"></p>
      </form>
      
      <div class="auth-or">Or</div>
      
      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>
  </div>
</div>

<script src="js/countries.js"></script>
<script src="js/main.js"></script>
</body>
</html>
